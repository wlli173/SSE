# Configuração do nginx do serviço CLIENT.
#
# Serve a SPA estática em /, e faz proxy reverso para o serviço SERVER
# (resolvido pelo DNS interno do docker-compose: `sse-server`).
#
# As diretivas de buffering são CRÍTICAS para SSE — sem elas, o nginx
# acumula o stream e o navegador só vê os eventos quando o buffer estoura.

upstream sse_backend {
    server sse-server:3000;
    keepalive 16;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;
    charset utf-8;

    # ---- arquivos estáticos da SPA ----
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache" always;
    }

    # ---- stream SSE — proxy para o backend ----
    location /events {
        proxy_pass              http://sse_backend/events;
        proxy_http_version      1.1;
        proxy_set_header        Host            $host;
        proxy_set_header        X-Real-IP       $remote_addr;
        proxy_set_header        Connection      "";

        # Essencial para SSE: desliga buffering e mantém a conexão aberta
        proxy_buffering         off;
        proxy_cache             off;
        proxy_set_header        Cache-Control   "no-cache";
        chunked_transfer_encoding on;
        proxy_read_timeout      24h;
        proxy_send_timeout      24h;
    }

    # ---- API REST do backend ----
    location /api/ {
        proxy_pass              http://sse_backend;
        proxy_http_version      1.1;
        proxy_set_header        Host            $host;
        proxy_set_header        X-Real-IP       $remote_addr;
    }
}
